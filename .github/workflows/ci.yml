name: Continuous Integration

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  continuous-integration:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Install dependencies
        run: npm install

      - name: Install Appium
        run: |
          npm install -g appium
          appium driver install uiautomator2

      - name: Install Allure CLI
        run: npm install -g allure-commandline

      - name: Make gradlew executable
        run: chmod +x android/gradlew

      - name: Build debug APK
        run: |
          cd android
          ./gradlew assembleDebug

      - name: Check APK
        run: |
          ls -la android/app/build/outputs/apk/debug/
          test -f android/app/build/outputs/apk/debug/app-debug.apk

      - name: Inspect APK
        run: |
          BUILD_TOOLS=$(find "$ANDROID_HOME/build-tools" -maxdepth 1 -mindepth 1 -type d | sort -V | tail -n 1)
          "$BUILD_TOOLS/aapt" dump badging android/app/build/outputs/apk/debug/app-debug.apk | head -40 || true

      - name: Run Android tests
        uses: ReactiveCircus/android-emulator-runner@v2
        with:
          api-level: 33
          arch: x86_64
          profile: pixel_4
          ram-size: 2048M
          heap-size: 512M
          disk-size: 6000M
          emulator-options: -no-window -gpu swiftshader_indirect -no-snapshot -noaudio -no-boot-anim
          disable-animations: true
          script: |
            set -e

            echo "Waiting for emulator device..."
            adb wait-for-device

            echo "Waiting for boot completion..."
            sh -c 'boot_completed=""; while [ "$boot_completed" != "1" ]; do boot_completed=$(adb shell getprop sys.boot_completed 2>/dev/null | tr -d "\r" || true); echo "boot status: $boot_completed"; sleep 5; done'

            echo "Waiting extra time for stabilization..."
            sleep 30

            echo "ADB devices:"
            adb devices

            echo "Disabling animations..."
            adb shell settings put global window_animation_scale 0 || true
            adb shell settings put global transition_animation_scale 0 || true
            adb shell settings put global animator_duration_scale 0 || true

            echo "Unlocking emulator..."
            adb shell input keyevent 82 || true

            echo "Starting logcat capture..."
            adb logcat -c || true
            nohup adb logcat > logcat.log 2>&1 &

            echo "Installing APK..."
            adb install -r android/app/build/outputs/apk/debug/app-debug.apk

            echo "Launching app..."
            adb shell monkey -p com.wdiodemoapp -c android.intent.category.LAUNCHER 1 || true
            sleep 10
            adb shell dumpsys window | grep -E 'mCurrentFocus|mFocusedApp' || true

            echo "Starting Appium..."
            nohup appium --base-path / > appium.log 2>&1 &
            sleep 15

            echo "Checking Appium status..."
            curl --fail http://127.0.0.1:4723/status

            echo "Running WDIO..."
            npm run wdio

      - name: Generate Allure report
        if: always()
        run: |
          mkdir -p allure-results
          allure generate ./allure-results -o ./allure-report --clean || true

      - name: Upload APK artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: app-debug-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: ignore

      - name: Upload Allure results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-results
          path: allure-results
          if-no-files-found: ignore

      - name: Upload Allure report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-report
          path: allure-report
          if-no-files-found: ignore

      - name: Upload Appium log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: appium-log
          path: appium.log
          if-no-files-found: ignore

      - name: Upload Logcat
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: logcat
          path: logcat.log
          if-no-files-found: ignore

      - name: Upload Emulator logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: emulator-logs
          path: |
            /home/runner/.android/adb*.log
            /home/runner/.android/emulator*.log
            /tmp/android-runner/**
          if-no-files-found: ignore