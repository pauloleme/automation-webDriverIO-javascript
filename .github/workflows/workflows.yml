name: Continuous Integration

on:
  pull_request:
  push:
    branches:
      - main
      - master

permissions:
  contents: read

jobs:
  continuous-integration:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    env:
      ANDROID_SDK_ROOT: /usr/local/lib/android/sdk
      ANDROID_HOME: /usr/local/lib/android/sdk
      ADB_INSTALL_TIMEOUT: 20

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install dependencies
        run: npm install

      - name: Install Allure CLI
        run: npm install -D allure-commandline

      - name: Show Android SDK info
        run: |
          echo "ANDROID_HOME=$ANDROID_HOME"
          echo "ANDROID_SDK_ROOT=$ANDROID_SDK_ROOT"
          which sdkmanager || true
          which adb || true
          which emulator || true

      - name: Install Android SDK components
        run: |
          yes | sdkmanager --licenses || true
          sdkmanager --install \
            "platform-tools" \
            "platforms;android-35" \
            "build-tools;35.0.0" \
            "emulator" \
            "system-images;android-35;google_apis;x86_64"

      - name: Build Android app
        run: |
          chmod +x android/gradlew
          cd android
          ./gradlew assembleDebug
          cd ..
          ls -la android/app/build/outputs/apk/debug || true

      - name: Verify APK exists
        run: |
          test -f android/app/build/outputs/apk/debug/app-debug.apk
          echo "APK found successfully"

      - name: Install Appium UiAutomator2 driver
        run: |
          npx appium driver install uiautomator2

      - name: Create Android emulator
        run: |
          echo "no" | avdmanager create avd --force --name ci-emulator --package "system-images;android-35;google_apis;x86_64" --device "pixel"

      - name: Start emulator
        run: |
          nohup emulator -avd ci-emulator -no-window -no-audio -no-boot-anim -gpu swiftshader_indirect -accel off -no-snapshot > emulator.log 2>&1 &
          adb start-server
          adb wait-for-device

          for i in {1..30}; do
            boot_completed=$(adb shell getprop sys.boot_completed 2>/dev/null | tr -d '\r')
            if [ "$boot_completed" = "1" ]; then
              echo "Emulator booted"
              break
            fi
            echo "Waiting for emulator boot... attempt $i"
            sleep 10
          done

          adb devices
          adb shell settings put global window_animation_scale 0 || true
          adb shell settings put global transition_animation_scale 0 || true
          adb shell settings put global animator_duration_scale 0 || true
          adb shell input keyevent 82 || true

      - name: Start Appium
        run: |
          nohup npx appium --base-path / > appium.log 2>&1 &
          sleep 15
          cat appium.log || true

      - name: Run tests
        run: npx wdio run ./wdio.android.app.conf.js
        continue-on-error: true

      - name: Generate Allure report
        if: always()
        run: |
          mkdir -p allure-results
          ./node_modules/.bin/allure generate allure-results --clean -o allure-report || true

      - name: Upload APK artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: app-debug-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk

      - name: Upload Allure results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-results
          path: allure-results

      - name: Upload Allure report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-report
          path: allure-report

      - name: Upload Appium log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: appium-log
          path: appium.log

      - name: Upload Emulator log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: emulator-log
          path: emulator.log