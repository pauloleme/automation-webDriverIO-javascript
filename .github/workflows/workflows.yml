name: Continuous Integration

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  continuous-integration:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Install dependencies
        run: npm ci

      - name: Install Appium
        run: |
          npm install -g appium
          appium driver install uiautomator2

      - name: Install Allure CLI
        run: npm install -g allure-commandline --save-dev

      - name: Make gradlew executable
        run: chmod +x android/gradlew

      - name: Build debug APK
        run: |
          cd android
          ./gradlew assembleDebug

      - name: Check APK
        run: |
          ls -la android/app/build/outputs/apk/debug/
          test -f android/app/build/outputs/apk/debug/app-debug.apk

      - name: Inspect APK
        run: |
          $ANDROID_HOME/build-tools/34.0.0/aapt dump badging android/app/build/outputs/apk/debug/app-debug.apk | head -40 || true

      - name: Run Android tests
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 33
          arch: x86_64
          profile: pixel_6
          emulator-options: -no-window -gpu swiftshader_indirect -no-snapshot -noaudio -no-boot-anim
          disable-animations: true
          script: |
            adb devices
            adb wait-for-device
            adb shell settings put global window_animation_scale 0
            adb shell settings put global transition_animation_scale 0
            adb shell settings put global animator_duration_scale 0
            adb shell input keyevent 82 || true

            nohup appium > appium.log 2>&1 &
            sleep 20

            adb install -r android/app/build/outputs/apk/debug/app-debug.apk || true
            adb shell pm list packages | grep wdio || true
            adb shell monkey -p com.wdiodemoapp -c android.intent.category.LAUNCHER 1 || true

            npx wdio run ./wdio.android.app.conf.js

      - name: Generate Allure report
        if: always()
        run: |
          mkdir -p allure-results
          allure generate ./allure-results -o ./allure-report --clean || true

      - name: Upload APK artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: app-debug-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk

      - name: Upload Allure results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-results
          path: allure-results
          if-no-files-found: ignore

      - name: Upload Allure report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-report
          path: allure-report
          if-no-files-found: ignore

      - name: Upload Appium log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: appium-log
          path: appium.log
          if-no-files-found: ignore

      - name: Upload Emulator log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: emulator-log
          path: |
            /home/runner/.android/adb*.log
            /home/runner/.android/emulator*.log
          if-no-files-found: ignore