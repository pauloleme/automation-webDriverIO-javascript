name: Continuous Integration

on:
  pull_request:

permissions:
  contents: write

jobs:
  continuous-integration:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm install

      - name: Install Allure CLI
        run: npm install -D allure-commandline

      - name: Start Appium
        run: |
          npx appium > appium.log 2>&1 &
          sleep 10

      - name: Run tests
        run: npm run wdio
        continue-on-error: true

      - name: Generate Allure report
        if: always()
        run: npx allure generate ./allure-results -o ./allure-report

      - name: Upload Allure results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-results
          path: allure-results

      - name: Upload Allure report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-report
          path: allure-report

      - name: Upload Appium log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: appium-log
          path: appium.log