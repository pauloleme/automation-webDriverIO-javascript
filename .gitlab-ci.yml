stages:
  - test

variables:
  ANDROID_SDK_ROOT: "$CI_PROJECT_DIR/android-sdk"
  ANDROID_HOME: "$CI_PROJECT_DIR/android-sdk"
  ANDROID_AVD_HOME: "$CI_PROJECT_DIR/.android/avd"
  JAVA_HOME: "/usr/lib/jvm/java-17-openjdk-amd64"

test:
  stage: test
  image: node:24-bullseye
  script:
    - export PATH="$PATH:$ANDROID_SDK_ROOT/cmdline-tools/latest/bin:$ANDROID_SDK_ROOT/platform-tools:$ANDROID_SDK_ROOT/emulator"
    - apt-get update
    - apt-get install -y openjdk-17-jdk wget unzip curl git
    - mkdir -p "$ANDROID_SDK_ROOT/cmdline-tools"
    - wget -O /tmp/commandlinetools.zip https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip
    - unzip -q /tmp/commandlinetools.zip -d "$ANDROID_SDK_ROOT/cmdline-tools"
    - mv "$ANDROID_SDK_ROOT/cmdline-tools/cmdline-tools" "$ANDROID_SDK_ROOT/cmdline-tools/latest"
    - yes | sdkmanager --licenses
    - sdkmanager --list | head -50
    - echo "ANDROID_HOME=$ANDROID_HOME"
    - echo "ANDROID_SDK_ROOT=$ANDROID_SDK_ROOT"
    - ls -la "$ANDROID_SDK_ROOT"
    - ls -la "$ANDROID_SDK_ROOT/cmdline-tools/latest/bin"
  artifacts:
    when: always
    paths:
      - android-sdk
    expire_in: 1 day