stages:
  - setup
  - test
  - deploy

variables:
  ANDROID_SDK_ROOT: "$CI_PROJECT_DIR/android-sdk"
  ANDROID_HOME: "$CI_PROJECT_DIR/android-sdk"
  ANDROID_AVD_HOME: "$CI_PROJECT_DIR/.android/avd"
  JAVA_HOME: "/usr/lib/jvm/java-17-openjdk-amd64"

setup-android:
  stage: setup
  image: node:24-bullseye
  script:
    - export PATH="$PATH:$ANDROID_SDK_ROOT/cmdline-tools/latest/bin:$ANDROID_SDK_ROOT/platform-tools:$ANDROID_SDK_ROOT/emulator"
    - apt-get update
    - apt-get install -y openjdk-17-jdk wget unzip curl git
    - mkdir -p "$ANDROID_SDK_ROOT/cmdline-tools"
    - wget -O /tmp/commandlinetools.zip https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip
    - unzip -q /tmp/commandlinetools.zip -d "$ANDROID_SDK_ROOT/cmdline-tools"
    - mv "$ANDROID_SDK_ROOT/cmdline-tools/cmdline-tools" "$ANDROID_SDK_ROOT/cmdline-tools/latest"
    - yes | sdkmanager --sdk_root="$ANDROID_SDK_ROOT" --licenses || true
    - sdkmanager --sdk_root="$ANDROID_SDK_ROOT" "platform-tools" "platforms;android-35" "build-tools;35.0.0"
  artifacts:
    when: always
    paths:
      - android-sdk
    expire_in: 1 day

run-tests:
  stage: test
  image: node:24-bullseye
  dependencies:
    - setup-android
  script:
    - export PATH="$PATH:$ANDROID_SDK_ROOT/cmdline-tools/latest/bin:$ANDROID_SDK_ROOT/platform-tools:$ANDROID_SDK_ROOT/emulator"
    - apt-get update
    - apt-get install -y openjdk-17-jdk wget unzip curl git
    - npm install
    - npm install -D allure-commandline
    - npx appium driver install uiautomator2
    - npx wdio run ./wdio.android.app.conf.js || true
    - npx allure generate ./allure-results -o ./allure-report || true
  artifacts:
    when: always
    paths:
      - allure-results
      - allure-report
    expire_in: 7 days

pages:
  stage: deploy
  dependencies:
    - run-tests
  script:
    - mkdir -p public
    - cp -r allure-report/* public/
  artifacts:
    paths:
      - public
  only:
    - main